name: Deploy to DigitalOcean

on:
  workflow_dispatch:
    inputs:
      region:
        description: "DigitalOcean region"
        required: false
        default: "nyc1"
        type: choice
        options:
          - nyc1
          - nyc3
          - sfo3
          - ams3
          - sgp1
          - lon1
          - fra1
          - blr1
      size:
        description: "Droplet size"
        required: false
        default: "s-4vcpu-8gb"
        type: choice
        options:
          - s-2vcpu-4gb
          - s-4vcpu-8gb
          - s-8vcpu-16gb
          - c-4-8gib
          - c-8-16gib
          - c-16-32gib

env:
  DROPLET_NAME: claude-devbox
  IMAGE: ubuntu-24-04-x64

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          if [ -z "$DIGITALOCEAN_ACCESS_TOKEN" ]; then
            echo "::error::DIGITALOCEAN_ACCESS_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$SSH_PUBLIC_KEY" ]; then
            echo "::error::SSH_PUBLIC_KEY secret is not set"
            exit 1
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Add SSH key to DigitalOcean
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          MD5_FP=$(ssh-keygen -lf /dev/stdin -E md5 <<< "$SSH_PUBLIC_KEY" | awk '{print $2}' | sed 's/^MD5://')
          KEY_ID=$(doctl compute ssh-key list --format ID,FingerPrint --no-header | grep "$MD5_FP" | awk '{print $1}' || true)
          if [ -z "$KEY_ID" ]; then
            KEY_ID=$(doctl compute ssh-key create claude-devbox-key --public-key "$SSH_PUBLIC_KEY" --format ID --no-header)
            echo "SSH key added to DigitalOcean (ID: $KEY_ID)."
          else
            echo "SSH key already exists (ID: $KEY_ID)."
          fi
          echo "SSH_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Destroy existing droplet if present
        run: |
          EXISTING_ID=$(doctl compute droplet list --format ID,Name --no-header | grep "$DROPLET_NAME" | awk '{print $1}' || true)
          if [ -n "$EXISTING_ID" ]; then
            echo "Destroying existing droplet $EXISTING_ID..."
            doctl compute droplet delete "$EXISTING_ID" --force
            sleep 10
          fi

      - name: Create cloud-init user data
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          cat > /tmp/cloud-init.yml <<EOF
          #cloud-config
          runcmd:
            - export SSH_PUBLIC_KEY="${SSH_PUBLIC_KEY}"
            - export GITHUB_TOKEN="${GITHUB_TOKEN}"
            - git clone https://github.com/${REPO}.git /opt/claude-devbox
            - cd /opt/claude-devbox && git checkout ${REF}
            - bash /opt/claude-devbox/cloud-providers/digitalocean/setup.sh >> /var/log/devbox-setup.log 2>&1
          EOF

      - name: Create Droplet
        run: |
          doctl compute droplet create "$DROPLET_NAME" \
            --image "$IMAGE" \
            --size "${{ inputs.size }}" \
            --region "${{ inputs.region }}" \
            --ssh-keys "$SSH_KEY_ID" \
            --user-data-file /tmp/cloud-init.yml \
            --tag-name claude-devbox \
            --wait

      - name: Get Droplet IP
        id: droplet-ip
        run: |
          IP=$(doctl compute droplet get "$DROPLET_NAME" --format PublicIPv4 --no-header)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Droplet IP: $IP"

      - name: Wait for droplet SSH to be ready
        env:
          IP: ${{ steps.droplet-ip.outputs.ip }}
        run: |
          echo "Waiting for SSH on $IP..."
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if nc -z -w5 "$IP" 22 2>/dev/null; then
              echo "SSH is responding!"
              break
            fi
            echo "Attempt $i/$MAX_ATTEMPTS: port 22 not ready yet"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Timed out waiting for SSH"
              exit 1
            fi
            sleep $SLEEP_SECONDS
          done

      - name: Print SSH access info
        env:
          IP: ${{ steps.droplet-ip.outputs.ip }}
        run: |
          echo "## SSH Access" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ssh root@${IP}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "=============================="
          echo "  SSH into your devbox:"
          echo "  ssh root@${IP}"
          echo "=============================="
          echo ""
          echo "Note: Tool installation runs in background via cloud-init."
          echo "Monitor progress: ssh root@${IP} 'tail -f /var/log/devbox-setup.log'"
          echo "Setup complete when: ssh root@${IP} 'test -f /root/.devbox-ready && echo READY'"
