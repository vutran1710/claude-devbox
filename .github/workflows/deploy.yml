name: Deploy to Railway

on:
  workflow_dispatch:

env:
  SERVICE_NAME: claude-devbox

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$SSH_PUBLIC_KEY" ]; then
            echo "::error::SSH_PUBLIC_KEY secret is not set"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Create service if needed
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          railway add --service "$SERVICE_NAME" --variables "SSH_PUBLIC_KEY=$SSH_PUBLIC_KEY" --json 2>/dev/null || echo "Service may already exist, continuing..."

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service "$SERVICE_NAME"

      - name: Wait for service to be ready
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Waiting for service to be ready..."
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(railway status --service "$SERVICE_NAME" --json 2>/dev/null | jq -r '.status // empty')
            echo "Attempt $i/$MAX_ATTEMPTS: status=$STATUS"
            if [ "$STATUS" = "running" ] || [ "$STATUS" = "success" ]; then
              echo "Service is ready!"
              break
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "crashed" ]; then
              echo "::error::Service deployment failed with status: $STATUS"
              exit 1
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Timed out waiting for service to be ready (${MAX_ATTEMPTS}x${SLEEP_SECONDS}s)"
              exit 1
            fi
            sleep $SLEEP_SECONDS
          done

      - name: Generate domain and print SSH access
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DOMAIN=$(railway domain --port 22 --service "$SERVICE_NAME" --json 2>/dev/null | jq -r '.domain // empty')
          if [ -n "$DOMAIN" ]; then
            echo "## SSH Access" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "ssh root@${DOMAIN}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "=============================="
            echo "  SSH into your devbox:"
            echo "  ssh root@${DOMAIN}"
            echo "=============================="
          else
            echo "Could not generate domain. Set it manually in Railway networking settings."
          fi
